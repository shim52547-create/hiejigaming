<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HieJi Gaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c1: #7c3aed; --c2: #06b6d4; --c3: #f0abfc;
    --bg: #07070f; --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(124,58,237,0.3); --text: #f1f5f9; --muted: #94a3b8;
  }
  body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* INTRO */
  #intro { position: fixed; inset: 0; background: #07070f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.8s ease, visibility 0.8s ease; }
  #intro.hidden { opacity: 0; visibility: hidden; }
  .intro-logo { width: 120px; height: 120px; border-radius: 24px; background: linear-gradient(135deg, var(--c1), var(--c2)); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -2px; animation: logoPulse 1.2s ease-out forwards; box-shadow: 0 0 60px rgba(124,58,237,0.6); overflow: hidden; }
  .intro-logo img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes logoPulse { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  .intro-name { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 700; color: #fff; margin-top: 1.2rem; letter-spacing: 4px; opacity: 0; animation: fadeUp 0.7s ease-out 0.9s forwards; }
  .intro-sub { font-size: 1rem; color: var(--c2); letter-spacing: 6px; text-transform: uppercase; margin-top: 0.4rem; opacity: 0; animation: fadeUp 0.7s ease-out 1.1s forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .intro-bar-wrap { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 2rem; overflow: hidden; opacity: 0; animation: fadeUp 0.5s ease-out 1.3s forwards; }
  .intro-bar { height: 100%; background: linear-gradient(90deg, var(--c1), var(--c2)); width: 0%; border-radius: 99px; animation: loadBar 2s ease-out 1.4s forwards; }
  @keyframes loadBar { from { width: 0%; } to { width: 100%; } }

  /* BACKGROUND IMAGE */
  #site-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-size: cover; background-position: center center;
    background-repeat: no-repeat; background-attachment: fixed;
    transition: opacity 0.8s ease;
  }
  #site-bg-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: rgba(7,7,15,0.5); transition: background 0.5s ease;
  }
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--c1); animation: float linear infinite; opacity: 0; }
  @keyframes float { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } 100% { transform: translateY(-20px) translateX(30px); opacity: 0; } }

  /* MAIN */
  #main { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 4rem; opacity: 0; transition: opacity 0.8s ease 0.2s; }
  #main.visible { opacity: 1; }
  .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%); top: -200px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 0; }

  /* PROFILE */
  .profile { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; margin-bottom: 2rem; text-align: center; }
  .avatar-ring { width: 96px; height: 96px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3)); animation: spinRing 8s linear infinite; }
  @keyframes spinRing { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #1a0a2e, #0c1a3e); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; color: #fff; border: 2px solid var(--bg); overflow: hidden; }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .profile-name { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900; background: linear-gradient(90deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; }
  .profile-tag { font-size: 0.95rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .profile-desc { font-size: 1rem; color: var(--muted); max-width: 320px; line-height: 1.6; }

  /* MUSIC PLAYER */
  .music-bar { display: flex; align-items: center; gap: 0.75rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 99px; padding: 0.5rem 1rem; width: 100%; max-width: 400px; margin-bottom: 2rem; backdrop-filter: blur(12px); }
  .music-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--c1), var(--c2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s; }
  .music-btn:hover { transform: scale(1.1); }
  .music-btn svg { width: 16px; height: 16px; fill: #fff; }
  .music-info { flex: 1; overflow: hidden; }
  .music-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .music-source { font-size: 0.75rem; color: var(--muted); }
  .music-wave { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .music-wave span { display: block; width: 3px; background: var(--c2); border-radius: 99px; animation: wave 1s ease-in-out infinite; opacity: 0.3; }
  .music-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .music-wave span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .music-wave span:nth-child(3) { height: 20px; animation-delay: 0.3s; }
  .music-wave span:nth-child(4) { height: 14px; animation-delay: 0.45s; }
  .music-wave span:nth-child(5) { height: 8px; animation-delay: 0.6s; }
  @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
  .music-wave.playing span { opacity: 1; }

  /* SECTIONS */
  .section-label { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--c1); font-weight: 700; margin-bottom: 0.75rem; align-self: flex-start; }
  .links-wrap { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 400px; margin-bottom: 2rem; }
  .link-card { display: flex; align-items: center; gap: 1rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 0.85rem 1.1rem; text-decoration: none; color: var(--text); backdrop-filter: blur(12px); transition: border-color 0.2s, transform 0.2s, background 0.2s; cursor: pointer; }
  .link-card:hover { border-color: var(--c1); background: rgba(124,58,237,0.1); transform: translateY(-2px); }
  /* Icon container: square if thumbnail, circle if emoji */
  .link-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; overflow: hidden; }
  .link-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
  .link-text { flex: 1; }
  .link-name { font-size: 1rem; font-weight: 600; line-height: 1.2; }
  .link-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .link-arrow { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .link-arrow svg { width: 12px; height: 12px; stroke: var(--muted); fill: none; stroke-width: 2; }
  .link-video-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; padding: 3px 10px; border-radius: 99px; background: rgba(124,58,237,0.18); border: 1px solid rgba(124,58,237,0.4); color: #a78bfa; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
  .link-video-btn:hover { background: rgba(124,58,237,0.35); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; width: 100%; max-width: 400px; margin-bottom: 2.5rem; }
  .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 0.85rem 0.5rem; text-align: center; backdrop-filter: blur(12px); }
  .stat-num { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; background: linear-gradient(90deg, var(--c1), var(--c2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }

  /* VIDEO TUTORIALS */
  .video-grid { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 400px; margin-bottom: 2rem; }
  .video-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; backdrop-filter: blur(12px); transition: border-color 0.2s, transform 0.2s; cursor: pointer; text-decoration: none; color: var(--text); display: block; }
  .video-card:hover { border-color: var(--c1); transform: translateY(-2px); }
  .video-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #0f0f1a; overflow: hidden; }
  .video-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .video-card:hover .video-thumb-wrap img { transform: scale(1.04); }
  .video-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .video-play-circle { width: 48px; height: 48px; border-radius: 50%; background: rgba(124,58,237,0.85); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(124,58,237,0.6); transition: transform 0.2s, background 0.2s; }
  .video-card:hover .video-play-circle { transform: scale(1.12); background: rgba(124,58,237,1); }
  .video-play-circle svg { width: 20px; height: 20px; fill: #fff; margin-left: 3px; }
  .video-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.75); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
  .video-cat-badge { position: absolute; top: 8px; left: 8px; font-size: 0.65rem; padding: 2px 8px; border-radius: 99px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .video-info { padding: 0.75rem 1rem; }
  .video-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
  .video-sub { font-size: 0.78rem; color: var(--muted); }

  /* ITEM MODAL (video + link tải) */
  #itemModal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
  #itemModal.open { display: flex; }
  .modal-box { width: 100%; max-width: 420px; background: #0f0f1a; border: 1px solid rgba(124,58,237,0.4); border-radius: 20px; overflow: hidden; }
  .modal-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .modal-icon { width: 42px; height: 42px; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .modal-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
  .modal-title { font-size: 1rem; font-weight: 700; flex: 1; }
  .modal-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.07); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.1rem; flex-shrink: 0; transition: background 0.2s; }
  .modal-close:hover { background: rgba(255,255,255,0.14); }
  .modal-video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  .modal-video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .modal-no-video { display: flex; align-items: center; justify-content: center; aspect-ratio: 16/9; background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.85rem; }
  .modal-footer { padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .modal-download-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem; border-radius: 12px; background: linear-gradient(135deg, var(--c1), var(--c2)); color: #fff; font-family: 'Orbitron', monospace; font-size: 0.82rem; font-weight: 700; letter-spacing: 2px; text-decoration: none; transition: opacity 0.2s, transform 0.15s; }
  .modal-download-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .modal-download-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }

  /* FOOTER */
  .footer { font-size: 0.75rem; color: rgba(255,255,255,0.2); text-align: center; margin-top: auto; padding-top: 2rem; letter-spacing: 2px; text-transform: uppercase; }

  /* ENTER SCREEN */
  #enter-screen { position: fixed; inset: 0; background: #07070f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.6s ease, visibility 0.6s ease; }
  #enter-screen.show { opacity: 1; visibility: visible; }
  #enter-screen.hide  { opacity: 0; visibility: hidden; }
  .enter-glow { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%); pointer-events: none; animation: pulseGlow 3s ease-in-out infinite; }
  @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } }
  .enter-logo { width: 90px; height: 90px; border-radius: 20px; background: linear-gradient(135deg, var(--c1), var(--c2)); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -2px; box-shadow: 0 0 40px rgba(124,58,237,0.5); margin-bottom: 1.5rem; position: relative; z-index: 1; overflow: hidden; }
  .enter-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
  .enter-name { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: 4px; margin-bottom: 0.4rem; position: relative; z-index: 1; }
  .enter-sub { font-size: 0.85rem; color: var(--c2); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 3rem; position: relative; z-index: 1; }
  .enter-btn { position: relative; z-index: 1; padding: 0.85rem 2.5rem; border-radius: 99px; border: none; background: linear-gradient(135deg, var(--c1), var(--c2)); color: #fff; font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; letter-spacing: 3px; cursor: pointer; box-shadow: 0 0 30px rgba(124,58,237,0.4); transition: transform 0.2s, box-shadow 0.2s; animation: btnPulse 2s ease-in-out infinite; }
  .enter-btn:hover { transform: scale(1.06); box-shadow: 0 0 50px rgba(124,58,237,0.7); }
  @keyframes btnPulse { 0%, 100% { box-shadow: 0 0 30px rgba(124,58,237,0.4); } 50% { box-shadow: 0 0 50px rgba(6,182,212,0.6); } }
  .enter-hint { position: relative; z-index: 1; font-size: 0.75rem; color: var(--muted); margin-top: 1rem; letter-spacing: 2px; }

  /* ADMIN FAB */
  .admin-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: background 0.2s; text-decoration: none; }
  .admin-fab:hover { background: rgba(255,255,255,0.12); }
  .admin-fab svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo" id="introLogo">HJ</div>
  <div class="intro-name">HIEJI GAMING</div>
  <div class="intro-sub">Gaming &bull; Content</div>
  <div class="intro-bar-wrap"><div class="intro-bar"></div></div>
</div>

<!-- ENTER SCREEN -->
<div id="enter-screen">
  <div class="enter-glow"></div>
  <div class="enter-logo" id="enterLogo">HJ</div>
  <div class="enter-name">HIEJI GAMING</div>
  <div class="enter-sub">Gaming &bull; Content</div>
  <button class="enter-btn" onclick="enterSite()">▶ ENTER</button>
  <div class="enter-hint">Bấm để vào trang &amp; bật nhạc</div>
</div>

<!-- BACKGROUND -->
<div id="site-bg"></div>
<div id="site-bg-overlay"></div>

<!-- PARTICLES -->
<div id="particles"></div>
<div class="bg-glow"></div>

<!-- MAIN -->
<div id="main">
  <div class="profile">
    <div class="avatar-ring">
      <div class="avatar-inner" id="mainAvatar">HJ</div>
    </div>
    <div class="profile-name">HieJi Gaming</div>
    <div class="profile-tag">🎮 Gaming Creator</div>
    <div class="profile-desc">Game thủ — Content creator — Review game &amp; app chất lượng cao</div>
  </div>

  <!-- MUSIC PLAYER -->
  <div class="music-bar">
    <button class="music-btn" id="playBtn" onclick="toggleMusic()" aria-label="Play/Pause">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <div class="music-info">
      <div class="music-title" id="musicTitle">Đang tải...</div>
      <div class="music-source" id="musicSource">—</div>
    </div>
    <div class="music-wave" id="musicWave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- YouTube IFrame Player (ẩn) -->
  <div id="yt-player-wrap" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;">
    <div id="yt-player"></div>
  </div>

  <!-- STATS -->
  <div class="section-label" style="width:100%;max-width:400px">📊 Thống kê</div>
  <div class="stats" id="statsGrid"></div>

  <!-- GAMES -->
  <div class="section-label" style="width:100%;max-width:400px">🎮 Game</div>
  <div class="links-wrap" id="gamesWrap"></div>

  <!-- APPS -->
  <div class="section-label" style="width:100%;max-width:400px">📱 Ứng dụng</div>
  <div class="links-wrap" id="appsWrap"></div>

  <!-- SOCIAL -->
  <div class="section-label" style="width:100%;max-width:400px">🔗 Mạng xã hội</div>
  <div class="links-wrap" id="socialWrap"></div>

  <!-- VIDEO TUTORIALS section ẩn đi, không dùng nữa -->
  <div id="videoSection" style="display:none"></div>

  <div class="footer">HieJi Gaming © 2025</div>
</div>

<!-- ITEM MODAL: video hướng dẫn + link tải -->
<div id="itemModal" onclick="closeItemModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div style="flex:1;min-width:0">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeItemModal()">&#x2715;</button>
    </div>
    <div id="modalVideoWrap"></div>
    <div class="modal-footer">
      <a id="modalDownloadBtn" href="#" target="_blank" class="modal-download-btn">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        TẢI / MỞ LINK
      </a>
    </div>
  </div>
</div>

<!-- ADMIN FAB -->
<a href="hieji-gaming-admin.html" class="admin-fab" title="Trang quản trị">
  <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
</a>

<script>

async function loadFromSupabase() {
  try {
    const { data, error } = await sb.from('hieji_config').select('key, value');
    if (error || !data) throw error;
    const result = {};
    data.forEach(row => { result[row.key] = row.value; });
    return {
      profile: result.profile ?? DEFAULT_DATA.profile,
      bg:      result.bg      ?? DEFAULT_DATA.bg,
      music:   result.music   ?? DEFAULT_DATA.music,
      stats:   result.stats   ?? DEFAULT_DATA.stats,
      games:   result.games   ?? DEFAULT_DATA.games,
      apps:    result.apps    ?? DEFAULT_DATA.apps,
      social:  result.social  ?? DEFAULT_DATA.social,
      videos:  result.videos  ?? DEFAULT_DATA.videos,
    };
  } catch (e) {
    console.warn('Supabase load failed, using defaults:', e);
    return DEFAULT_DATA;
  }
}

// ── BACKGROUND ──
function applyBg(bg) {
  const bgEl      = document.getElementById('site-bg');
  const overlayEl = document.getElementById('site-bg-overlay');
  if (bg && bg.url) {
    bgEl.style.backgroundImage = `url('${bg.url}')`;
    const opacity = (bg.opacity ?? 50) / 100;
    overlayEl.style.background = `rgba(7,7,15,${opacity})`;
  } else {
    bgEl.style.backgroundImage = 'none';
    overlayEl.style.background = 'transparent';
  }
}

// ── AVATAR ──
function applyAvatar(url) {
  const avatarEls = [
    document.getElementById('mainAvatar'),
    document.getElementById('introLogo'),
    document.getElementById('enterLogo')
  ];
  avatarEls.forEach(el => {
    if (!el) return;
    if (url) {
      el.innerHTML = `<img src="${url}" alt="HJ" onerror="this.parentElement.innerHTML='HJ'">`;
    } else {
      el.innerHTML = 'HJ';
    }
  });
}

// ── RENDER LINKS ──
function renderLinks(containerId, items) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.innerHTML = '';
  if (!items || items.length === 0) {
    wrap.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:.5rem 0">Chưa có mục nào</div>';
    return;
  }
  // games và apps → mở modal; social → mở link thẳng
  const useModal = (containerId === 'gamesWrap' || containerId === 'appsWrap');
  items.forEach(item => {
    const a = document.createElement('a');
    if (useModal) {
      a.href = '#';
      a.onclick = (e) => { e.preventDefault(); openItemModal(item); };
    } else {
      a.href = item.url || '#';
      if (item.url && item.url !== '#') a.target = '_blank';
    }
    a.className = 'link-card';

    const iconHtml = item.thumb
      ? `<div class="link-icon"><img src="${item.thumb}" alt="${item.name}" onerror="this.parentElement.innerHTML='${item.icon||'📌'}'"></div>`
      : `<div class="link-icon" style="background:${item.color}22">${item.icon || '📌'}</div>`;

    a.innerHTML = `
      ${iconHtml}
      <div class="link-text">
        <div class="link-name">${item.name}</div>
        <div class="link-sub">${item.desc || ''}</div>
      </div>
      <div class="link-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    wrap.appendChild(a);
  });
}

function renderStats(stats) {
  const grid = document.getElementById('statsGrid');
  if (!grid) return;
  grid.innerHTML = '';
  (stats || []).forEach(s => {
    const d = document.createElement('div');
    d.className = 'stat-card';
    d.innerHTML = `<div class="stat-num">${s.value}</div><div class="stat-label">${s.label}</div>`;
    grid.appendChild(d);
  });
}

function renderAll(data) {
  siteData = data;
  applyBg(data.bg);
  applyAvatar(data.profile?.avatarUrl || '');
  renderStats(data.stats);
  renderLinks('gamesWrap', data.games);
  renderLinks('appsWrap', data.apps);
  renderLinks('socialWrap', data.social);
  renderVideos(data.videos);

  const m = data.music || {};
  document.getElementById('musicTitle').textContent  = m.title  || 'Chưa có nhạc';
  document.getElementById('musicSource').textContent = m.source || (m.url ? 'YouTube' : '—');

  const videoId = getYouTubeID(m.url);
  if (videoId && ytReady && !ytPlayer) initPlayer(videoId);
}

// ── REALTIME ──
function subscribeRealtime() {
  sb.channel('hieji_config_changes')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'hieji_config' }, async () => {
      const data = await loadFromSupabase();
      renderAll(data);
    })
    .subscribe();
}

// ── MUSIC ──
let ytPlayer = null, playing = false, ytReady = false;

function getYouTubeID(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

const ytTag = document.createElement('script');
ytTag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytTag);

window.onYouTubeIframeAPIReady = function () {
  ytReady = true;
  if (siteData) {
    const videoId = getYouTubeID(siteData.music?.url);
    if (videoId) initPlayer(videoId);
  }
};

function initPlayer(videoId) {
  if (ytPlayer) { ytPlayer.destroy(); ytPlayer = null; }
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1', videoId,
    playerVars: { autoplay: 0, loop: 1, playlist: videoId },
    events: {
      onStateChange: function (e) {
        playing = e.data === YT.PlayerState.PLAYING;
        document.getElementById('playIcon').style.display  = playing ? 'none' : '';
        document.getElementById('pauseIcon').style.display = playing ? '' : 'none';
        document.getElementById('musicWave').classList.toggle('playing', playing);
      }
    }
  });
}

function toggleMusic() {
  if (!siteData) return;
  const videoId = getYouTubeID(siteData.music?.url);
  if (!videoId) return;
  if (!ytPlayer && ytReady) { initPlayer(videoId); setTimeout(() => ytPlayer?.playVideo(), 800); return; }
  playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

// ── ITEM MODAL (video + link tải) ──
function openItemModal(item) {
  // Icon
  const iconEl = document.getElementById('modalIcon');
  if (item.thumb) {
    iconEl.innerHTML = `<img src="${item.thumb}" alt="${item.name}" onerror="this.parentElement.innerHTML='${item.icon||'📌'}'">`;
    iconEl.style.background = '';
  } else {
    iconEl.innerHTML = item.icon || '📌';
    iconEl.style.background = (item.color || '#7c3aed') + '22';
  }

  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalSub').textContent = item.desc || '';

  // Video
  const videoWrap = document.getElementById('modalVideoWrap');
  const ytVid = getYouTubeID(item.videoUrl);
  const isTikTok = item.videoUrl && item.videoUrl.includes('tiktok.com');

  if (ytVid) {
    // YouTube → embed trực tiếp
    videoWrap.innerHTML = `<div class="modal-video-wrap"><iframe src="https://www.youtube.com/embed/${ytVid}?autoplay=1" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>`;
  } else if (isTikTok || item.videoUrl) {
    // TikTok hoặc link video khác → nút bấm mở tab mới
    const label = isTikTok ? '▶ Xem video hướng dẫn trên TikTok' : '▶ Xem video hướng dẫn';
    const icon = isTikTok ? '🎵' : '▶';
    videoWrap.innerHTML = `
      <div class="modal-no-video" style="flex-direction:column;gap:0.75rem;padding:1.5rem">
        <div style="font-size:2rem">${icon}</div>
        <a href="${item.videoUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:0.6rem 1.4rem;border-radius:99px;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.5);color:#a78bfa;font-weight:700;font-size:0.85rem;text-decoration:none;transition:background 0.2s" onmouseover="this.style.background='rgba(124,58,237,0.35)'" onmouseout="this.style.background='rgba(124,58,237,0.2)'">${label}</a>
      </div>`;
  } else {
    videoWrap.innerHTML = '<div class="modal-no-video">Chưa có video hướng dẫn</div>';
  }

  // Nút tải
  const btn = document.getElementById('modalDownloadBtn');
  if (item.url && item.url !== '#') {
    btn.href = item.url;
    btn.style.display = 'flex';
  } else {
    btn.style.display = 'none';
  }

  document.getElementById('itemModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeItemModal(e) {
  if (e && e.target !== document.getElementById('itemModal') && !e.target.closest('.modal-close')) return;
  // Dừng video
  const videoWrap = document.getElementById('modalVideoWrap');
  videoWrap.innerHTML = '';
  document.getElementById('itemModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeItemModal({ target: document.getElementById('itemModal') });
});

// ── PARTICLES ──
function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = ['#7c3aed','#06b6d4','#f0abfc','#818cf8'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay   = (Math.random() * 10) + 's';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  spawnParticles();
  const data = await loadFromSupabase();
  renderAll(data);
  subscribeRealtime();

  setTimeout(() => {
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('enter-screen').classList.add('show');
  }, 3600);
});

function enterSite() {
  document.getElementById('enter-screen').classList.remove('show');
  document.getElementById('enter-screen').classList.add('hide');
  document.getElementById('main').classList.add('visible');

  if (!siteData) return;
  const videoId = getYouTubeID(siteData.music?.url);
  if (!videoId) return;
  if (ytPlayer) { ytPlayer.playVideo(); }
  else if (ytReady) { initPlayer(videoId); setTimeout(() => ytPlayer?.playVideo(), 800); }
}
